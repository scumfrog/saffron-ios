name: Saffron
options:
  bundleIdPrefix: com.saffron
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Saffron:
    type: application
    platform: iOS
    sources:
      - path: Saffron
    resources:
      - path: Saffron/Resources
    entitlements:
      path: Saffron/Saffron.entitlements
    info:
      path: Saffron/Info.plist
      properties:
        CFBundleDisplayName: Saffron
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - saffron
        NSCameraUsageDescription: "Used to capture recipe photos."
        NSPhotoLibraryUsageDescription: "Used to import recipe photos."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saffron.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    capabilities:
      iCloud:
        cloudKit: true
      pushNotifications: {}
      appGroups:
        groups:
          - group.com.saffron.app
    dependencies:
      - target: SaffronShareExtension

  SaffronShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SaffronShareExtension
    entitlements:
      path: SaffronShareExtension/SaffronShareExtension.entitlements
    info:
      path: SaffronShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Saffron
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saffron.app.share
    capabilities:
      appGroups:
        groups:
          - group.com.saffron.app
