name: Saffron
options:
  bundleIdPrefix: app.saffron
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "55B6G89M7F"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "4"

targets:
  Saffron:
    type: application
    platform: iOS
    sources:
      - path: Saffron
    resources:
      - path: Saffron/Resources
    info:
      path: Saffron/Info.plist
      properties:
        CFBundleDisplayName: Saffron
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - saffron
        NSCameraUsageDescription: "Used to capture recipe photos."
        NSPhotoLibraryUsageDescription: "Used to import recipe photos."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.saffron.ios
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Saffron/Saffron.entitlements
    dependencies:
      - target: SaffronShareExtension

  SaffronShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SaffronShareExtension
    info:
      path: SaffronShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Saffron
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.saffron.ios.share
        CODE_SIGN_ENTITLEMENTS: SaffronShareExtension/SaffronShareExtension.entitlements

