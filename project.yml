name: Saffron
options:
  bundleIdPrefix: app.saffron
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "55B6G89M7F"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "24"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO

targets:
  Saffron:
    type: application
    platform: iOS
    sources:
      - path: Saffron
    resources:
      - path: Saffron/Resources
    info:
      path: Saffron/Info.plist
      properties:
        CFBundleDisplayName: Saffron
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - saffron
        WorkerAPIKey: "$(WORKER_API_KEY)"
        NSCameraUsageDescription: "Used to capture recipe photos."
        NSPhotoLibraryUsageDescription: "Used to import recipe photos."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.saffron.ios
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Saffron/Saffron.entitlements
    dependencies:
      - target: SaffronShareExtension

  SaffronTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SaffronTests
    dependencies:
      - target: Saffron
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.saffron.ios.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Saffron.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Saffron
        BUNDLE_LOADER: $(TEST_HOST)

  SaffronShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SaffronShareExtension
    info:
      path: SaffronShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Saffron
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.saffron.ios.share
        CODE_SIGN_ENTITLEMENTS: SaffronShareExtension/SaffronShareExtension.entitlements

schemes:
  Saffron:
    build:
      targets:
        Saffron: all
        SaffronShareExtension: [build]
        SaffronTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: SaffronTests
          parallelizable: true
          randomExecutionOrder: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
